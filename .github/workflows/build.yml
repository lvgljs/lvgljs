name: Build & Test

on:
  push:
    branches: ['develop', 'main', 'release/*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-device:
    name: Linux device
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libffi-dev libcurl4-openssl-dev
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Bundle the React UI bindings, demos and tests
        run: yarn bundle
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LVGL_SIMULATOR=OFF \
            -DUSE_EXTERNAL_FFI=ON
      - name: Build lvgljs
        run: cmake --build build -j
      - name: Run tests
        run: build/lvgljs run scripts/run-tests.js --capture
      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lvgljs-test-screenshots-linux-device
          path: _screenshots/
          retention-days: 90

  linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libffi-dev libsdl2-dev libcurl4-openssl-dev xvfb
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Bundle the React UI bindings, demos and tests
        run: yarn bundle
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LVGL_SIMULATOR=ON \
            -DUSE_EXTERNAL_FFI=ON
      - name: Build lvgljs
        run: cmake --build build -j
      - name: Run tests
        run: xvfb-run -a build/lvgljs run scripts/run-tests.js --capture
      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lvgljs-test-screenshots-linux
          path: _screenshots/
          retention-days: 90

  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install system dependencies
        run: brew install ninja sdl2 libffi curl
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Bundle the React UI bindings, demos and tests
        run: yarn bundle
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_LVGL_SIMULATOR=ON \
            -DUSE_EXTERNAL_FFI=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix sdl2);$(brew --prefix libffi);$(brew --prefix curl)"
      - name: Build lvgljs
        run: cmake --build build -j
      - name: Run tests
        run: build/lvgljs run scripts/run-tests.js --capture
      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lvgljs-test-screenshots-macos
          path: _screenshots/
          retention-days: 90

  windows:
    name: Windows
    runs-on: windows-2025
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-binary-cache
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Resolve vcpkg revision
        id: vcpkg
        shell: pwsh
        run: |
          $rev = git -C "$env:VCPKG_INSTALLATION_ROOT" rev-parse HEAD
          "rev=$rev" >> $env:GITHUB_OUTPUT
      - name: Prepare vcpkg binary cache directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
      - name: Cache vcpkg binary artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ steps.vcpkg.outputs.rev }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ steps.vcpkg.outputs.rev }}-
            vcpkg-${{ runner.os }}-
      - name: Install vcpkg dependencies
        run: vcpkg install curl:x64-windows-static zlib:x64-windows-static libffi:x64-windows-static sdl2:x64-windows-static
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Bundle the React UI bindings, demos and tests
        run: yarn bundle
      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded$<$<CONFIG:Debug>:Debug>
          -DBUILD_LVGL_SIMULATOR=ON
      - name: Build lvgljs
        run: cmake --build build --config Release
      - name: Run tests
        run: build/Release/lvgljs.exe run scripts/run-tests.js --capture
      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lvgljs-test-screenshots-windows
          path: _screenshots/
          retention-days: 90

  collect-screenshots:
    name: Collect test screenshots
    needs: [linux-device, linux, macos, windows]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          pattern: lvgljs-test-screenshots-*
          path: artifacts
      - name: Upload combined test screenshots
        if: hashFiles('artifacts/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: lvgljs-test-screenshots
          path: artifacts/
          retention-days: 90
